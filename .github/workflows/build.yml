name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller

    - name: 编译EXE
      run: |
        pyinstaller --onefile --windowed --name "配箱工具" --icon=NONE run.py

    - name: 上传EXE产物
      uses: actions/upload-artifact@v4
      with:
        name: 配箱工具-Windows-exe
        path: dist/配箱工具.exe
        retention-days: 30
